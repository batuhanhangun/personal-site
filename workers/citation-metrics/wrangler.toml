name             = "citation-metrics"
main             = "src/index.ts"
compatibility_date = "2026-03-17"

# ── Cron trigger ──────────────────────────────────────────────────────────────
# Runs daily at 08:00 UTC.  Add more triggers if desired:
#   "0 20 * * *"  = 20:00 UTC (end of day)
[triggers]
crons = ["0 8 * * *"]

# ── KV namespace ──────────────────────────────────────────────────────────────
# Create with:
#   npx wrangler kv namespace create CITATION_METRICS
# Then replace the id placeholder below with the returned id.
#
# Preview namespace (for `wrangler dev`):
#   npx wrangler kv namespace create CITATION_METRICS --preview
[[kv_namespaces]]
binding         = "CITATION_METRICS"
id              = "1b950a1ae205422b9c0a2fce16b3eb50"
preview_id      = "6868bf691e4543aa832d964ebdfdf2e6"

# ── Secrets ───────────────────────────────────────────────────────────────────
# Set all three via wrangler CLI before deploying:
#
#   npx wrangler secret put SERPAPI_KEY
#   npx wrangler secret put SCOPUS_API_KEY
#   npx wrangler secret put SCOPUS_AUTHOR_ID
#
# These are NOT committed — they live only in the Cloudflare dashboard.

# ── Dev environment overrides ─────────────────────────────────────────────────
[env.dev]
name = "citation-metrics-dev"
